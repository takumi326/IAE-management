name: API CI

on:
  pull_request:
    paths:
      - "api/**"
      - "docker/**"
      - "docker-compose.yml"
      - ".github/workflows/api-ci.yml"
  push:
    branches: [main]
    paths:
      - "api/**"
      - "docker/**"
      - "docker-compose.yml"
      - ".github/workflows/api-ci.yml"

defaults:
  run:
    working-directory: api

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('api/.ruby-version', 'api/**/.rubocop.yml', 'api/**/.rubocop_todo.yml', 'api/Gemfile.lock') }}
        with:
          path: api/${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d api_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      RAILS_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/api_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install PostgreSQL client libraries (pg gem)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Apply schema with Ridgepole
        run: bundle exec ridgepole -c config/database.yml -E test --apply -f db/Schemafile

      - name: Run RSpec
        run: bundle exec rspec
