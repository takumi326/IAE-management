services:
  db:
    image: mysql:8.4
    container_name: iae_db
    environment:
      MYSQL_ROOT_PASSWORD: postgres
      MYSQL_DATABASE: iae_management_development
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppostgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iae_api
    working_dir: /app/api
    command: bash -lc "bundle install && rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      DATABASE_URL: mysql2://root:postgres@db:3306/iae_management_development
      TEST_DATABASE_URL: mysql2://root:postgres@db:3306/api_test
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - bundle_data:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: iae_web
    working_dir: /app/web
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - web_node_modules:/app/web/node_modules
    depends_on:
      - api

volumes:
  mysql_data:
  bundle_data:
  web_node_modules:
