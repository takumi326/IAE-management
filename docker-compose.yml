services:
  db:
    image: postgres:16
    container_name: iae_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iae_management_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iae_management_development"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iae_api
    working_dir: /app/api
    command: bash -lc "bundle install && bundle exec ridgepole -c config/database.yml -E development --apply -f db/Schemafile && rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      DATABASE_URL: postgresql://postgres:postgres@db:5432/iae_management_development
      TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/api_test
      SUPABASE_URL: ${SUPABASE_URL:-}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - bundle_data:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: iae_web
    working_dir: /app/web
    # node_modules はホストの ./web/node_modules（bind）を使う。名前付きボリュームだと依存追加後に解決できないことがある
    command: sh -lc "set -eu && npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3000
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
    depends_on:
      - api

volumes:
  postgres_data:
  bundle_data:
