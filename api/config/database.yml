# PostgreSQL with pg adapter.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV["DATABASE_URL"] || "postgresql://postgres:postgres@127.0.0.1:5432/iae_management_development" %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  url: <%= ENV["TEST_DATABASE_URL"] || "postgresql://postgres:postgres@127.0.0.1:5432/api_test" %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
